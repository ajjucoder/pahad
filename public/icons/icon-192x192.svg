<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B7553;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D5235;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Mountain symbol (Pahad means mountain in Nepali) -->
  <g fill="#FAFAF5">
    <!-- Main mountain -->
    <polygon points="96,45 40,130 152,130" fill="#FAFAF5" opacity="0.9"/>
    <!-- Secondary mountain -->
    <polygon points="70,75 30,130 110,130" fill="#FAFAF5" opacity="0.6"/>
    <!-- Sun/circle accent -->
    <circle cx="145" cy="55" r="18" fill="#D4A574" opacity="0.9"/>
  </g>
</svg>
