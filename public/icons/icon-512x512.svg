<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B7553;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D5235;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Mountain symbol (Pahad means mountain in Nepali) -->
  <g fill="#FAFAF5">
    <!-- Main mountain -->
    <polygon points="256,120 100,350 412,350" fill="#FAFAF5" opacity="0.9"/>
    <!-- Secondary mountain -->
    <polygon points="185,200 80,350 290,350" fill="#FAFAF5" opacity="0.6"/>
    <!-- Tertiary mountain -->
    <polygon points="340,250 260,350 420,350" fill="#FAFAF5" opacity="0.4"/>
    <!-- Sun accent -->
    <circle cx="385" cy="145" r="48" fill="#D4A574" opacity="0.9"/>
  </g>
</svg>
